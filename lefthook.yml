pre-commit:
  parallel: true
  commands:
    fmt-check:
      glob: "*.go"
      run: gofmt -l {staged_files} | grep . && echo "Run 'go fmt' to fix" && exit 1 || true
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD ./...

pre-push:
  commands:
    test-coverage:
      run: go test -short -count=1 -coverprofile=coverage.out ./... && go tool cover -func=coverage.out | tail -n 1
      fail_text: "Tests failed — fix before pushing"
